<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark">

<div class="container">

  <div class="topbar">
    <h2>🎐 Sales Dashboard</h2>
  </div>

  <!-- Welcome -->
  <div class="glass-card" id="welcomeCard">
    <h3 id="welcome"></h3>
  </div>

  <!-- Today's Date -->
  <div class="glass-card" id="dateDisplay">
    Today's Date: <span id="todayDate"></span>
  </div>

  <!-- Sales Form -->
  <div class="glass-card">
    <h3>Enter Sold Items</h3>
    <form id="itemForm">
      <label>AMC Amount</label><input type="number" name="amc" min="0">
      <label>MTF Amount</label><input type="number" name="mtf" min="0">
      <label>C/S Amount</label><input type="number" name="cs" min="0">
      <label>EW+ Amount</label><input type="number" name="ew" min="0">
      <label>EW+ Bike Number</label><input type="text" name="ewBike">
      <label>D Carbon Amount</label><input type="number" name="dcarbon" min="0">
      <label>D Carbon Bike Number</label><input type="text" name="dcarbonBike">
      <label>Cotting Amount</label><input type="number" name="cotting" min="0">
      <label>Cotting Bike Number</label><input type="text" name="cottingBike">
      <label>OIL Amount</label><input type="number" name="oil" min="0">
      <button type="submit">Submit</button>
    </form>
  </div>

  <!-- Totals Box -->
  <div class="glass-card" id="totalsBox">
    <h3>Monthly Totals</h3>
    <div id="totalsContent"></div>
  </div>

  <!-- Daily Sales List -->
  <div class="glass-card">
    <h3>Daily Sales</h3>
    <div id="salesList"></div>
  </div>

  <!-- Monthly Chart -->
  <div class="glass-card chart-card">
    <h3>Monthly Summary</h3>
    <canvas id="monthlyChart"></canvas>
  </div>

  <!-- Logout -->
  <button id="logoutBtn">LOGOUT</button>

  <!-- Footer -->
  <div class="glass-card" style="text-align:center; font-size:14px; margin-top:10px;">
    Made by Viresh
  </div>

  <!-- Custom Popup -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <p id="popupText"></p>
      <button id="popupConfirm">Yes</button>
      <button id="popupCancel">Cancel</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
